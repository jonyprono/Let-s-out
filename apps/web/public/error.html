<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aucune connexion - Let's Out</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --primary: #FF7A00;
      --circle-bg: #fee2e2;
      --circle-icon: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0b;
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --circle-bg: rgba(239, 68, 68, 0.2);
      }
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .icon-container {
      width: 96px;
      height: 96px;
      background-color: var(--circle-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .icon {
      width: 48px;
      height: 48px;
      color: var(--circle-icon);
    }
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 15px;
      color: var(--text-muted);
      margin: 0 0 40px 0;
      line-height: 1.5;
      max-width: 320px;
    }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 10px 15px -3px rgba(255, 122, 0, 0.3);
      transition: transform 0.1s;
    }
    button:active {
      transform: scale(0.95);
    }
    .refresh-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22"></line>
      <path d="M8.5 8.5a5 5 0 0 1 7 0"></path>
      <path d="M5 5a10 10 0 0 1 14 0"></path>
      <path d="M12 20h.01"></path>
    </svg>
  </div>
  
  <h1>Aucune connexion</h1>
  <p>Vérifiez votre connexion internet et réessayez pour lancer l'application.</p>
  
  <button onclick="window.location.reload()">
    <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
      <path d="M3 3v5h5"></path>
    </svg>
    Réessayer
  </button>
</body>
</html>
