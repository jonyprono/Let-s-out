
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>Lets Out</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <style>
        html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #root { height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
        .loading { text-align: center; color: #666; }
        .loading h1 { font-size: 24px; margin: 20px 0; }
        .loading p { font-size: 14px; color: #999; }
        .loading .spinner { 
          border: 3px solid #f3f3f3; 
          border-top: 3px solid #3498db; 
          border-radius: 50%; 
          width: 40px; 
          height: 40px; 
          animation: spin 1s linear infinite;
          margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </head>

    <body>
      <div id="root">
        <div class="loading">
          <h1>Lets Out</h1>
          <div class="spinner"></div>
          <p>Chargement...</p>
        </div>
      </div>
      <script>
        // Global error handler for debugging
        window.addEventListener('error', function(e) {
          console.error('Global error:', e.error);
          document.getElementById('root').innerHTML = '<div class="loading"><h1>⚠️ Erreur</h1><p>' + (e.error?.message || e.message || 'Erreur inconnue') + '</p></div>';
        });
        
        window.addEventListener('unhandledrejection', function(e) {
          console.error('Unhandled rejection:', e.reason);
          document.getElementById('root').innerHTML = '<div class="loading"><h1>⚠️ Erreur</h1><p>' + (e.reason?.message || String(e.reason) || 'Erreur inconnue') + '</p></div>';
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
