
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <meta name="google-site-verification" content="_L0Vkb-5JIr23pqZAUBVJQGUfzJ4Rab0VrEqAKkB50g" />
      <title>Let's Out</title>
      <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
      <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
      <link rel="icon" type="image/webp" href="/icons/icon-192.webp" />
      <link rel="apple-touch-icon" href="/icons/icon-192.webp" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <style>
        html, body { min-height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #root { min-height: 100%; background: #f5f5f5; }
        .loading-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .loading { text-align: center; color: #666; }
        .loading h1 { font-size: 24px; margin: 20px 0; }
        .loading p { font-size: 14px; color: #999; }
        .loading .spinner { 
          border: 3px solid #f3f3f3; 
          border-top: 3px solid #3498db; 
          border-radius: 50%; 
          width: 40px; 
          height: 40px; 
          animation: spin 1s linear infinite;
          margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </head>

    <body>
      <div id="root">
        <div class="loading-container">
          <div class="loading">
            <img src="/icons/icon-192.webp" alt="Let's Out" style="width:72px;height:72px;border-radius:20px;margin-bottom:12px;object-fit:contain;" />
            <h1>Let's Out</h1>
            <div class="spinner"></div>
            <p>Chargement...</p>
          </div>
        </div>
      </div>

      <script>
        // ── Early native-app detection — runs BEFORE React ──────────────────
        // When Capacitor loads https://letsout.app inside the native WebView,
        // we must redirect to /app immediately so the LandingPage is never shown.
        (function () {
          var loc = window.location;
          // Only act on the root path
          if (loc.pathname !== '/') return;

          var ua = navigator.userAgent || '';
          var isCapacitorProtocol = loc.protocol === 'capacitor:' || loc.protocol === 'ionic:';
          // Android WebView user-agent always contains 'wv'
          var isAndroidWebView = /wv/.test(ua) && /Android/.test(ua);
          // iOS WKWebView used by Capacitor has no 'Safari' keyword but has 'AppleWebKit'
          var isIOSWebView = /iPhone|iPad|iPod/.test(ua) && !/Safari/.test(ua) && /AppleWebKit/.test(ua);

          if (isCapacitorProtocol || isAndroidWebView || isIOSWebView) {
            // Replace current history entry so the back button doesn't return here
            loc.replace('/app');
          }
        })();

        // Global error handler for debugging
        window.addEventListener('error', function(e) {
          console.error('Global error:', e.error);
          document.getElementById('root').innerHTML = '<div class="loading"><h1>⚠️ Erreur</h1><p>' + (e.error?.message || e.message || 'Erreur inconnue') + '</p></div>';
        });
        
        window.addEventListener('unhandledrejection', function(e) {
          console.error('Unhandled rejection:', e.reason);
          document.getElementById('root').innerHTML = '<div class="loading"><h1>⚠️ Erreur</h1><p>' + (e.reason?.message || String(e.reason) || 'Erreur inconnue') + '</p></div>';
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
